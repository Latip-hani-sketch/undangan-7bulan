<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Syukuran 7 Bulan - Latip & Hani</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f5f0;
            overflow: hidden; /* Mengunci halaman agar tidak bisa digulir manual sebelum tombol diklik */
            -webkit-font-smoothing: antialiased;
        }

        /* Mengunci posisi flex untuk cover awal */
        .body-locked {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* HALAMAN SAMPUL (COVER) */
        .cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fdfbf7 0%, #ede8df 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
            text-align: center;
        }
        
        /* CONTAINER UTAMA DENGAN ORNAMEN */
        .container {
            background-color: #ffffff;
            padding: 50px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(140, 123, 101, 0.15);
            max-width: 420px;
            width: 88%;
            border: 1px solid rgba(212, 197, 171, 0.5);
            box-sizing: border-box;
            position: relative;
            animation: containerAppear 1.2s ease-out forwards;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid #d4c5ab;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes containerAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* TIPOGRAFI / FONT */
        .sub-title-arabic {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 20px;
            color: #8c7b65;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #2c2c2c;
            margin: 10px 0 0 0;
        }

        .sub-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: #8c7b65;
            margin-top: 2px;
            margin-bottom: 30px;
            letter-spacing: 4px;
            font-weight: 400;
        }

        .nama-pasangan {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: #4a4a4a;
            margin: 15px 0;
            font-style: italic;
        }

        .yth-text {
            font-size: 13px;
            color: #8a8a8a;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .nama-tamu {
            font-size: 18px;
            color: #3a3a3a;
            font-weight: 600;
            margin-top: 5px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* TOMBOL BUKA DENGAN EFEK KLIK */
        .btn-buka {
            position: relative;
            display: inline-block;
            cursor: pointer;
            background-color: #8c7b65;
            color: #ffffff;
            padding: 14px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(140, 123, 101, 0.4);
            border: none;
            outline: none;
            overflow: hidden;
        }

        .btn-buka:hover {
            background-color: #736450;
            box-shadow: 0 8px 20px rgba(140, 123, 101, 0.6);
            transform: translateY(-2px);
        }

        .btn-buka:active {
            transform: translateY(1px) scale(0.95);
            box-shadow: 0 3px 10px rgba(140, 123, 101, 0.4);
        }

        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        /* WRAPPER UTAMA SETELAH DIBUKA */
        .main-content-wrapper {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #1a1a1a;
        }

        /* LAYAR VIDEO TETAP DI TEMPAT (BACKGROUND FIXED) */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            z-index: 1;
        }
        
        video {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0 auto;
            object-fit: cover;
        }

        /* TOMBOL "KLIK DISINI UNTUK LOKASI" (MELAYANG DI ATAS VIDEO) */
        .btn-trigger-maps {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 12px 26px;
            background-color: rgba(140, 123, 101, 0.9); /* Menggunakan warna dasar tema undangan */
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn-trigger-maps:hover {
            background-color: rgba(115, 100, 80, 1);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* KONTEN MAPS YANG MUNCUL DARI BAWAH (ANIMASI SLIDE UP) */
        .maps-section {
            position: fixed;
            bottom: -100vh; /* Awalnya bersembunyi di bawah layar */
            left: 0;
            z-index: 10;
            width: 100%;
            background: linear-gradient(to bottom, rgba(253,251,247,0.98) 0%, #ede8df 100%);
            padding: 50px 0 60px 0;
            text-align: center;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.4);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            transition: bottom 0.8s cubic-bezier(0.25, 1, 0.5, 1); /* Efek slide naik yang smooth */
        }

        /* Kelas pemicu animasi naik */
        .maps-section.show {
            bottom: 0;
        }

        .maps-container {
            background-color: #ffffff;
            padding: 40px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(140, 123, 101, 0.1);
            max-width: 400px;
            width: 85%;
            margin: 0 auto;
            border: 1px solid rgba(212, 197, 171, 0.4);
            box-sizing: border-box;
            position: relative;
        }

        /* Tombol Tutup Panel Maps X */
        .btn-close-maps {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 18px;
            color: #888888;
            cursor: pointer;
            font-weight: bold;
        }

        .maps-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #2c2c2c;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .maps-desc {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* TOMBOL GOOGLE MAPS PREMIUM */
        .btn-maps {
            display: inline-block;
            text-decoration: none;
            background-color: #c4a47c;
            color: #ffffff;
            padding: 13px 30px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(196, 164, 124, 0.4);
        }

        .btn-maps:hover {
            background-color: #aa8b63;
            box-shadow: 0 7px 20px rgba(196, 164, 124, 0.6);
            transform: translateY(-2px);
        }

        /* RESPONSIVITAS TAMPILAN PC */
        @media screen and (min-width: 600px) {
            video {
                max-width: 450px;
                box-shadow: 0 0 30px rgba(0,0,0,0.8);
            }
            .maps-section {
                left: 50%;
                transform: translateX(-50%);
                max-width: 450px;
                border-bottom-left-radius: 0;
                border-bottom-right-radius: 0;
            }
        }
    </style>
</head>
<body class="body-locked">

    <!-- COVERS SCREEN -->
    <div id="cover" class="cover-screen">
        <div class="container">
            <p class="sub-title-arabic">Walimatul Hamli</p>
            <h1 class="main-title">UNDANGAN SYUKURAN</h1>
            <h2 class="sub-title">7 BULANAN</h2>
            
            <div class="nama-pasangan">Latip & Hani</div>
            
            <hr style="width: 40px; border: 0; border-top: 1px solid #d4c5ab; margin: 25px auto;">

            <p class="yth-text">Kepada Yth.</p>
            <div id="namaTamu" class="nama-tamu">Bapak/Ibu/Saudara/i</div>
            
            <button onclick="bukaUndangan(event)" class="btn-buka">
                📩 BUKA UNDANGAN
            </button>
        </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div id="mainWrapper" class="main-content-wrapper">
        
        <!-- VIDEO BACKGROUND SECTION -->
        <div class="video-container">
            <video id="myVideo" playsinline loop controlslist="nodownload">
                <source src="undangan.mp4" type="video/mp4">
                Browser Anda tidak mendukung pemutar video ini.
            </video>
        </div>

        <!-- TOMBOL DI ATAS VIDEO SESUAI PERMINTAAN -->
        <button id="triggerBtn" onclick="tampilkanLokasi()" class="btn-trigger-maps">
            📍 KliK Disini Untuk Lokasi
        </button>

        <!-- GOOGLE MAPS PANEL SECTION (SLIDE UP) -->
        <div id="mapsPanel" class="maps-section">
            <div class="maps-container">
                <!-- Tombol silang untuk menutup kembali panel maps jika ingin lihat videonya lagi -->
                <button onclick="tutupLokasi()" class="btn-close-maps">✕</button>
                
                <div class="maps-title">Lokasi Acara</div>
                <p class="maps-desc">
                    Kehadiran Bapak/Ibu/Saudara/i merupakan pelengkap kebahagiaan kami.<br>
                    Klik tombol di bawah untuk membuka petunjuk jalan menuju rumah kami via Google Maps.
                </p>
                <a href="https://maps.app.goo.gl/GFUSHVVayi59fsnn6?g_st=ic" target="_blank" class="btn-maps">
                    📍 BUKA GOOGLE MAPS
                </a>
            </div>
        </div>

    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const nama = urlParams.get('to');
            if (nama) {
                document.getElementById("namaTamu").innerText = decodeURIComponent(nama);
            }
        }

        function bukaUndangan(event) {
            var btn = event.currentTarget;

            var ripple = document.createElement("span");
            ripple.classList.add("ripple");
            btn.appendChild(ripple);
            
            var rect = btn.getBoundingClientRect();
            var x = event.clientX - rect.left;
            var y = event.clientY - rect.top;
            
            ripple.style.left = x + "px";
            ripple.style.top = y + "px";
            
            var mainWrapper = document.getElementById("mainWrapper");
            mainWrapper.style.display = "block";

            var video = document.getElementById("myVideo");
            video.play();

            var cover = document.getElementById("cover");
            
            setTimeout(function() {
                cover.style.opacity = "0";
                cover.style.transform = "scale(1.1)";
                
                setTimeout(function() {
                    cover.style.visibility = "hidden";
                    ripple.remove();
                }, 1000);
            }, 200);
        }

        // Fungsi memunculkan panel lokasi dari bawah saat tombol diklik
        function tampilkanLokasi() {
            var panel = document.getElementById("mapsPanel");
            var btn = document.getElementById("triggerBtn");
            panel.classList.add("show");
            btn.style.opacity = "0"; // Sembunyikan tombol pemicu sementara saat panel terbuka
            btn.style.pointerEvents = "none";
        }

        // Fungsi menyembunyikan kembali panel lokasi jika tamu ingin menonton videonya lagi
        function tutupLokasi() {
            var panel = document.getElementById("mapsPanel");
            var btn = document.getElementById("triggerBtn");
            panel.classList.remove("show");
            btn.style.opacity = "1"; // Munculkan kembali tombol pemicunya
            btn.style.pointerEvents = "auto";
        }
    </script>

</body>
</html>
